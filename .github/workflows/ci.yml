name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache llama.cpp xcframework
        uses: actions/cache@v4
        with:
          path: Vendor
          key: llama-${{ hashFiles('scripts/fetch-llama.sh') }}

      - name: Fetch native dependencies
        run: make deps

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Bundle apps (without model)
        run: |
          scripts/bundle-app.sh CapsBlink
          scripts/bundle-app.sh CapsBlinkAgents

      - name: Zip app bundles
        run: |
          cd dist
          ditto -c -k --keepParent CapsBlink.app CapsBlink.app.zip
          ditto -c -k --keepParent CapsBlinkAgents.app CapsBlinkAgents.app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apps-${{ github.sha }}
          path: dist/*.app.zip
          retention-days: 14
