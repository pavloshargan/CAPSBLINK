name: Release

# Two ways to produce a GitHub Release with universal, model-bundled DMGs
# for both apps:
#   1. push a `vX.Y.Z` tag, or
#   2. Actions tab → Release → "Run workflow" and enter a version
#      (the release + tag are created on the selected branch's head).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 1.0.0 (tag v<version> will be created)"
        required: true

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache llama.cpp xcframework
        uses: actions/cache@v4
        with:
          path: Vendor
          key: llama-${{ hashFiles('scripts/fetch-llama.sh') }}

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: Models
          key: model-${{ hashFiles('scripts/fetch-model.sh') }}

      - name: Fetch native dependencies
        run: make deps

      - name: Fetch model
        run: make model

      - name: Test
        run: swift test

      - name: Bundle apps (universal, model bundled)
        env:
          UNIVERSAL: "1"
          BUNDLE_MODEL: "1"
        run: |
          export VERSION="${RELEASE_TAG#v}"
          scripts/bundle-app.sh CapsBlink
          scripts/bundle-app.sh CapsBlinkAgents

      - name: Build DMGs
        run: |
          export VERSION="${RELEASE_TAG#v}"
          scripts/make-dmg.sh CapsBlink
          scripts/make-dmg.sh CapsBlinkAgents

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Installation
            1. Download the DMG for the app you want:
               - **CapsBlink** — watches a webpage, blinks Caps Lock on meaningful changes (bundled local LLM).
               - **CapsBlinkAgents** — blinks Caps Lock when Claude Code or Codex finishes.
            2. Drag the app to Applications and launch it from the menu bar.
            3. The apps are ad-hoc signed: on first launch, right-click → Open,
               or run `xattr -cr /Applications/<App>.app`.
            4. Grant **Input Monitoring** permission when prompted (required to drive the Caps Lock LED).
